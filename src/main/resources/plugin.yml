name: CustomDiscs
version: '${plugin_version}'
main: me.Navoei.customdiscsplugin.CustomDiscs
api-version: '${bukkit_api_version}'
prefix: CustomDiscs
authors: [ "Navoei" ]
contributors: ["Athar42", "alfw" ]
website: https://github.com/Navoei/CustomDiscs
description: A plugin which uses the Simple Voice Chat API to add custom music discs, goat horns and player heads. (Paper/Purpur/Folia)

permissions:
  customdiscs.*:
    description: Grants all CustomDiscs permissions
    default: op
    children:
      customdiscs.create: true
      customdiscs.download: true
      customdiscs.revert: true
      customdiscs.range: true
      customdiscs.horncooldown: true
      customdiscs.reload: true
      customdiscs.update: true
  customdiscs.create:
    description: Allows creating custom discs, horns and heads
    default: op
  customdiscs.download:
    description: Allows downloading audio files from a URL
    default: op
  customdiscs.revert:
    description: Allows reverting custom items to their original state
    default: op
  customdiscs.range:
    description: Allows setting the audio range of custom items
    default: op
  customdiscs.horncooldown:
    description: Allows setting the cooldown of custom goat horns
    default: op
  customdiscs.reload:
    description: Allows reloading the plugin configuration
    default: op
  customdiscs.update:
    description: Receives update notifications on join
    default: op